<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

<style>
    .background {
    background-image: url("1280 black.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    margin: 0;
    padding: 0;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    }
    .login-box {
        width: 300px;
        padding: 40px;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        text-align: center;
        box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }
    .login-container {
        background: (255,255,255,0.1);
        backdrop-filter: blur(15px);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,2555,0.2);
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .profile-pic {
        width: 100px;
        height: 100px;
        background-image: url("51ce4918bef690500348d35aefcb11d4.jpg");
        background-size: cover;
        background-position: center;
        border-radius: 50%;
        margin: 0 auto 10px;
        border: 3px solid white;
    }

    .login-container-h3 {
        color: white;
        margin-bottom: 20px;
        font-family: sans-serif;
    }
    
    .input-field {
        width: 100px;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: none;
        outline: none;
        box-sizing:  border-box;
    }
    
    .btn-login {
        width: 100%;
        padding: 12px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn-login:hover {
        background: #0056b3;
    }

</style>
</head>

<body class="background">
    <div class="login-container">
        <div class="profile-pic"></div>
        <div class="user-info">
        <h3 style="color: white; font-family: sans-serif;"></h3>Naufal Refi Meilano</h3>
        <p>kelas: XII TKJ 1</p>
        <p>NISN: 14232</p>
        </div>

<form class="login-form">
    <input type="text" placeholder="Username" class="input-field">
    <input type="password" placeholder="Password" class="input-field">
    <button type="submit" class="btn-login">Login</button>
</form>
</div>
</body>

</html>
